# Proxymate CI — currently disabled
#
# This project targets macOS 26 (Tahoe) and uses macOS-26-only APIs
# (modern NSPanel, SMAppService 26, etc.). GitHub Actions does not yet
# publish macos-26 runner images — the newest available is macos-15
# with Xcode 16.4 + SDK 15.5, which refuses to build a macOS-26 target.
# Not a code issue, an unsupported-platform issue on the CI side.
#
# Authoritative release pipeline: ./scripts/build-dmg.sh on a Mac
# running macOS 26. Workflow preserved for one-diff reactivation when
# GH ships macos-26 runners — bump runs-on and restore push/PR triggers.

name: CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -project proxymate.xcodeproj \
            -scheme proxymate \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project proxymate.xcodeproj \
            -scheme proxymate \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  release-build:
    name: Release Build
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild build \
            -project proxymate.xcodeproj \
            -scheme proxymate \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxymate-release
          path: build/Build/Products/Release/proxymate.app
          if-no-files-found: ignore
