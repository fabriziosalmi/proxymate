name: Deploy docs to GitHub Pages

# Triggers:
#   - push to main that touches docs/** or this workflow
#   - manual run from the Actions tab (workflow_dispatch)
#
# Required GitHub settings (one-time):
#   Settings → Pages → Source: "GitHub Actions"
#   Settings → Actions → General → Workflow permissions:
#     - Read and write permissions
#     - Allow GitHub Actions to create and approve pull requests (not needed
#       for this workflow, optional)
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Minimum permissions for Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel in-flight deploys; serialize instead so the latest push wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # VitePress reads git log for lastUpdated timestamps

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with VitePress
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
