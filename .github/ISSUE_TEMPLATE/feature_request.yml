name: Feature Request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Proxy / Networking
        - WAF / Rules
        - Blacklists
        - Privacy
        - AI / LLM
        - Cache
        - MITM / TLS
        - UI / UX
        - Distribution
        - Other
    validations:
      required: true
