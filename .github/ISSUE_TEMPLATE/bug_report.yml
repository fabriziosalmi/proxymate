name: Bug Report
description: Report a bug in Proxymate
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. 15.2
    validations:
      required: true
  - type: input
    id: proxymate-version
    attributes:
      label: Proxymate version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Active profile
      options:
        - Privacy
        - Developer
        - Work
        - Family Safety
        - Minimal
        - Custom
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log entries from the Logs tab.
      render: text
